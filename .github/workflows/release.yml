name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g., v0.5.0)'
        required: true
        type: string

jobs:
  # Build a "fat" source tarball that includes the vendor/link git submodule.
  # GitHub's auto-generated archives omit submodule contents, so we produce our
  # own tarball and upload it as a release artifact.  The Homebrew formula uses
  # this tarball as its `url` so that the Ableton Link SDK is available during
  # `brew install --build-from-source`.
  build-homebrew-tarball:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag || github.ref }}
          submodules: recursive

      - name: Create fat source tarball
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          VERSION="${TAG#v}"
          STAGING="wail-${VERSION}"
          # Export the repo tree (excludes .git) into a named staging directory
          mkdir -p "/tmp/${STAGING}"
          git archive --format=tar HEAD | tar -x -C "/tmp/${STAGING}"
          # Overlay the submodule contents (git archive omits them)
          cp -r vendor/link "/tmp/${STAGING}/vendor/link"
          # Package and compute checksum
          tar -czf "wail-${VERSION}-src.tar.gz" -C /tmp "${STAGING}"
          sha256sum "wail-${VERSION}-src.tar.gz" | awk '{print $1}' > "wail-${VERSION}-src.tar.gz.sha256"

      - uses: actions/upload-artifact@v7
        with:
          name: wail-homebrew-src
          path: |
            wail-*-src.tar.gz
            wail-*-src.tar.gz.sha256

  build-windows:
    runs-on: windows-latest
    env:
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: "sccache"
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag || github.ref }}
          submodules: recursive

      - uses: dtolnay/rust-toolchain@stable

      - uses: mozilla-actions/sccache-action@v0.0.9

      - uses: Swatinem/rust-cache@v2

      - uses: actions/setup-go@v5
        with:
          go-version-file: wail-app/go.mod

      - name: Cache vcpkg
        id: vcpkg-cache
        uses: actions/cache@v5
        with:
          path: C:\vcpkg\installed
          key: vcpkg-opus-x64-windows-v1

      - name: Install opus via vcpkg
        if: steps.vcpkg-cache.outputs.cache-hit != 'true'
        run: vcpkg install opus:x64-windows

      - name: Install pkg-config
        run: choco install pkgconfiglite -y
        continue-on-error: true

      - name: Build plugin
        env:
          PKG_CONFIG_PATH: C:\vcpkg\installed\x64-windows\lib\pkgconfig
        run: cargo xtask bundle-plugin

      - name: Build Go app (linkstub)
        env:
          PKG_CONFIG_PATH: C:\vcpkg\installed\x64-windows\lib\pkgconfig
        run: go build -tags linkstub -o NUL .
        working-directory: wail-app

      - name: Collect artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist
          Copy-Item C:\vcpkg\installed\x64-windows\bin\opus.dll dist\
          Copy-Item target\bundled\wail-plugin-send.clap dist\
          Copy-Item -Recurse target\bundled\wail-plugin-send.vst3 dist\wail-plugin-send.vst3
          Copy-Item target\bundled\wail-plugin-recv.clap dist\
          Copy-Item -Recurse target\bundled\wail-plugin-recv.vst3 dist\wail-plugin-recv.vst3
          Copy-Item dist\opus.dll dist\wail-plugin-send.vst3\Contents\x86_64-win\
          Copy-Item dist\opus.dll dist\wail-plugin-recv.vst3\Contents\x86_64-win\

      - uses: actions/upload-artifact@v7
        with:
          name: wail-release-windows
          path: dist\

  build-linux:
    runs-on: ubuntu-22.04
    env:
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: "sccache"
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag || github.ref }}
          submodules: recursive

      - uses: dtolnay/rust-toolchain@stable

      - uses: mozilla-actions/sccache-action@v0.0.9

      - uses: Swatinem/rust-cache@v2

      - uses: actions/setup-go@v5
        with:
          go-version-file: wail-app/go.mod

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libssl-dev \
            libopus-dev \
            libgl-dev \
            libx11-xcb-dev \
            libxcb1-dev \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libsoup-3.0-dev \
            cmake \
            g++

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          echo "value=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Build plugin
        run: cargo xtask bundle-plugin

      - name: Clone abletonlink-go
        run: git clone --recursive https://github.com/DatanoiseTV/abletonlink-go.git "$RUNNER_TEMP/abletonlink-go"

      - name: Build wail desktop app
        run: |
          sed -i "s|^replace github.com/DatanoiseTV/abletonlink-go.*|replace github.com/DatanoiseTV/abletonlink-go => $RUNNER_TEMP/abletonlink-go|" go.mod
          go build -ldflags "-X main.appVersion=${{ steps.version.outputs.value }}" -o "$GITHUB_WORKSPACE/dist/bin/wail" .
        working-directory: wail-app

      - name: Stage release artifacts
        run: |
          mkdir -p dist/lib
          cp target/bundled/wail-plugin-send.clap dist/lib/
          cp -r target/bundled/wail-plugin-send.vst3 dist/lib/
          cp target/bundled/wail-plugin-recv.clap dist/lib/
          cp -r target/bundled/wail-plugin-recv.vst3 dist/lib/
          cat > dist/README.txt <<'EOF'
          WAIL — WAN Audio Interchange for Link

          Runtime dependencies (Debian/Ubuntu):
            sudo apt install libwebkit2gtk-4.1-0 libopus0

          Run:
            ./bin/wail

          On first launch the CLAP/VST3 plugins in lib/ are copied to
          ~/.clap/ and ~/.vst3/ so your DAW can find them.

          Documentation: https://github.com/MostDistant/WAIL
          EOF

      - uses: actions/upload-artifact@v7
        with:
          name: wail-release-linux
          path: dist/

  create-release:
    needs: [build-windows, build-linux, build-homebrew-tarball]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v8

      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag || github.ref }}
          path: source
          sparse-checkout: homebrew

      - name: Determine tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Package platform artifacts
        run: |
          VERSION="${{ steps.tag.outputs.version }}"
          # Windows: zip, with a top-level wail-<version>/ directory inside.
          mv wail-release-windows "wail-${VERSION}"
          zip -r "wail-windows-x64-${VERSION}.zip" "wail-${VERSION}"
          mv "wail-${VERSION}" wail-release-windows
          # Linux: tarball, same top-level directory layout.
          mv wail-release-linux "wail-${VERSION}"
          tar -czf "wail-linux-x64-${VERSION}.tar.gz" "wail-${VERSION}"
          mv "wail-${VERSION}" wail-release-linux

      - name: Find individual installers
        id: files
        run: |
          echo "src_tarball=$(ls wail-homebrew-src/wail-*-src.tar.gz 2>/dev/null | head -1 || true)" >> "$GITHUB_OUTPUT"

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          files: |
            wail-windows-x64-${{ steps.tag.outputs.version }}.zip
            wail-linux-x64-${{ steps.tag.outputs.version }}.tar.gz
            ${{ steps.files.outputs.src_tarball }}

      # Update the Homebrew tap formula with the new version and SHA256.
      # Requires a HOMEBREW_TAP_TOKEN secret with push access to MostDistant/homebrew-wail.
      # If the secret is not configured, this step is skipped gracefully.
      - name: Update Homebrew tap
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          [ -z "${GH_TOKEN}" ] && echo "HOMEBREW_TAP_TOKEN not set, skipping tap update." && exit 0
          VERSION="${{ steps.tag.outputs.version }}"
          SHA=$(cat wail-homebrew-src/wail-*-src.tar.gz.sha256 | head -1)
          URL="https://github.com/MostDistant/WAIL/releases/download/v${VERSION}/wail-${VERSION}-src.tar.gz"

          git clone "https://x-access-token:${GH_TOKEN}@github.com/MostDistant/homebrew-wail.git" tap
          # Copy full formula from source so all formula changes are deployed
          cp source/homebrew/wail.rb tap/Formula/wail.rb
          # Patch URL and SHA for this release
          sed -i \
            "s|url \".*\"|url \"${URL}\"|" \
            tap/Formula/wail.rb
          sed -i \
            "s|sha256 \".*\"|sha256 \"${SHA}\"|" \
            tap/Formula/wail.rb
          cd tap
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git commit -am "Update wail to v${VERSION}"
          git push
